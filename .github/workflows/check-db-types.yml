name: Check DB Types

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  check-types:
    name: Verify database types are up to date
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: supabase/setup-cli@v1
        with:
          version: 2.84.4

      - name: Install dependencies
        run: npm ci

      - name: Start Supabase
        run: supabase start -x edge-runtime,imgproxy,logflare,vector,studio

      - name: Check for type drift
        run: |
          supabase db reset
          supabase gen types typescript --local > /tmp/db-types-check.ts
          if ! diff -u src/types/database.generated.ts /tmp/db-types-check.ts > /tmp/db-types-diff.txt 2>&1; then
            echo "::error::Database types are stale. Run 'npm run db:types' locally and commit the result."
            cat /tmp/db-types-diff.txt
            # Also dump the fresh file so we can copy it if needed
            echo "--- FRESH GENERATED FILE CONTENTS ---"
            cat /tmp/db-types-check.ts
            exit 1
          fi
          echo "Database types are up to date."

      - name: Stop Supabase
        if: always()
        run: supabase stop
