name: Check DB Types

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  check-types:
    name: Verify database types are up to date
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: supabase/setup-cli@v1
        with:
          version: 2.84.4

      - name: Install dependencies
        run: npm ci

      - name: Start Supabase
        run: supabase start -x edge-runtime,imgproxy,logflare,vector,studio

      - name: Generate types from migrations
        run: |
          supabase db reset
          supabase gen types typescript --local > src/types/database.generated.ts

      - name: Check for drift and auto-fix
        run: |
          if git diff --quiet src/types/database.generated.ts; then
            echo "Database types are up to date."
          else
            echo "Database types were stale. Auto-committing the fresh version."
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add src/types/database.generated.ts
            git commit -m "chore: regenerate database types from migrations [skip ci]"
            git push
            echo "::warning::Database types were stale and have been auto-updated. Please pull the latest changes."
          fi

      - name: Stop Supabase
        if: always()
        run: supabase stop
