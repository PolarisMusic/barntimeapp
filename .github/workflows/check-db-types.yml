name: Check DB Types

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  check-types:
    name: Verify database types are up to date
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: supabase/setup-cli@v1
        with:
          version: 2.84.4

      - name: Install dependencies
        run: npm ci

      - name: Start Supabase
        run: supabase start -x edge-runtime,imgproxy,logflare,vector,studio

      - name: Check for type drift
        run: npm run db:types:check

      - name: Stop Supabase
        if: always()
        run: supabase stop
